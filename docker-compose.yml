services:
  postgres:
    image: postgres:16-alpine
    container_name: tmp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tmp_db
      POSTGRES_USER: tmp_user
      POSTGRES_PASSWORD: tmp_password
    ports:
      - "5433:5432"
    volumes:
      - tmp_postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tmp_user -d tmp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tmp-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - tmp_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tmp_postgres_data:
  tmp_redis_data:
